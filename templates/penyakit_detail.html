<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Detail Penyakit - {{ penyakit.nama }}</title>
  <style>
    /* === BASE STYLE === */
    * {
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    body {
      margin: 0;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #d8e7ff, #f5fbff);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      position: relative;
      animation: fadeInBody 1s ease-in-out;
    }

    @keyframes fadeInBody {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === BACKGROUND PARTICLES === */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(0,123,255,0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatParticle linear infinite;
      opacity: 0.6;
    }

    @keyframes floatParticle {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-2000px) rotate(360deg); }
    }

    /* === CARD CONTAINER === */
    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 40px rgba(0, 80, 160, 0.1);
      border-radius: 25px;
      padding: 50px;
      max-width: 750px;
      width: 100%;
      color: #222;
      position: relative;
      z-index: 10;
      overflow: hidden;
      animation: slideUpCard 0.8s ease-out;
    }

    @keyframes slideUpCard {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .card::before {
      content: "";
      position: absolute;
      top: -120px;
      right: -120px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle at center, #cce0ff 0%, transparent 75%);
      opacity: 0.6;
      transform: rotate(25deg);
    }

    h1 {
      color: #004aad;
      font-size: 2rem;
      margin-bottom: 25px;
      text-align: center;
      letter-spacing: 0.8px;
      animation: titlePop 1s ease;
    }

    @keyframes titlePop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* === BACK LINK === */
    .back-link {
      display: inline-block;
      margin-bottom: 25px;
      text-decoration: none;
      color: #0066ff;
      font-weight: 600;
      transition: 0.3s ease;
      z-index: 10;
      position: relative;
    }

    .back-link:hover {
      color: #004aad;
      transform: translateX(-6px);
    }

    /* === BOX STYLE === */
    .highlight-box {
      background: linear-gradient(135deg, #eef6ff, #ffffff);
      border-left: 6px solid #007bff;
      padding: 15px 20px;
      border-radius: 14px;
      margin-top: 14px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(30px);
    }

    /* === ANIMATION APPEAR SEQUENCE === */
    .highlight-box.show {
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === BOX EFFECTS === */
    .highlight-box:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, #f0f7ff, #ffffff);
      box-shadow: 0 5px 15px rgba(0, 85, 170, 0.15);
    }

    .highlight-box::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(0,123,255,0.1), transparent);
      transition: 0.5s;
    }

    .highlight-box:hover::before {
      left: 100%;
    }

    p {
      margin: 0;
      font-size: 1rem;
      color: #333;
      line-height: 1.7;
    }

    strong {
      color: #004080;
    }

    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #666;
      text-align: center;
      animation: fadeInFooter 1.5s ease;
      z-index: 10;
      position: relative;
    }

    @keyframes fadeInFooter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === CARD GLOW === */
    .card:hover {
      box-shadow: 0 25px 45px rgba(0, 91, 196, 0.25);
      transform: translateY(-5px);
    }
  </style>
</head>
<body>

  <!-- Latar Partikel -->
  <div class="particles" id="particles"></div>

  <a href="{{ url_for('informasi') }}" class="back-link">← Kembali ke Daftar Penyakit</a>

  <div class="card">
    <h1>{{ penyakit.nama }}</h1>

    <div class="highlight-box"><p><strong>🩺 Gejala:</strong> {{ penyakit.gejala }}</p></div>
    <div class="highlight-box"><p><strong>💊 Penanganan:</strong> {{ penyakit.penanganan }}</p></div>
    <div class="highlight-box"><p><strong>🛡️ Pencegahan:</strong> {{ penyakit.pencegahan }}</p></div>
    <div class="highlight-box"><p><strong>📖 Detail Lengkap:</strong> {{ penyakit.detail }}</p></div>
  </div>

  <footer>© 2025 DiagnoSmart | Sistem Pakar Rumah Sakit</footer>

  <script>
    // === ANIMASI MUNCUL BERURUTAN ===
    document.addEventListener("DOMContentLoaded", () => {
      const boxes = document.querySelectorAll(".highlight-box");
      boxes.forEach((box, i) => {
        setTimeout(() => box.classList.add("show"), i * 300);
      });

      // === GENERATE PARTIKEL CAHAYA ===
      const container = document.getElementById("particles");
      const particleCount = 25;
      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.classList.add("particle");
        const size = Math.random() * 10 + 5; // ukuran random
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${Math.random() * 100}%`;
        p.style.top = `${Math.random() * 100 + 100}%`; // start dari bawah
        p.style.animationDuration = `${10 + Math.random() * 15}s`;
        p.style.animationDelay = `${Math.random() * 5}s`;
        container.appendChild(p);
      }
    });
  </script>

</body>
</html>
