<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Edit Profil - DiagnoSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; transition: all 0.3s ease; }

    body {
      margin: 0;
      height: 100vh;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #8ec5fc, #e0c3fc, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    canvas#particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .edit-box {
      position: relative;
      z-index: 1;
      backdrop-filter: blur(25px);
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 25px;
      padding: 50px 40px;
      width: 420px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
      color: #fff;
      animation: fadeIn 1.2s ease;
    }

    h2 {
      color: #fff;
      margin-bottom: 25px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.9);
      font-size: 14px;
      color: #333;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0,123,255,0.6);
      transform: scale(1.02);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #007bff, #0056d6);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 8px 25px rgba(0,123,255,0.5);
    }

    button:hover {
      background: linear-gradient(90deg, #0056d6, #003bb8);
      transform: translateY(-2px);
    }

    a.kembali {
      display: inline-block;
      margin-top: 18px;
      color: #ffeb3b;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    a.kembali:hover { text-decoration: underline; }

    .footer {
      margin-top: 25px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.7);
    }

    /* Flash Message */
    .flash {
      margin-bottom: 15px;
      padding: 10px 15px;
      border-radius: 12px;
      font-weight: 500;
      animation: fadeIn 0.5s ease;
    }
    .flash.success { background: rgba(0,255,127,0.2); color: #00ff9d; }
    .flash.warning { background: rgba(255,255,0,0.2); color: #ffeb3b; }
    .flash.danger { background: rgba(255,0,0,0.2); color: #ff5555; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="edit-box">
    <h2>🧩 Edit Profil</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('edit_user') }}">
      <input type="text" name="nama" value="{{ user.nama }}" placeholder="Nama Lengkap" required>
      <input type="text" name="username" value="{{ user.username }}" placeholder="Username" required>
      <input type="email" name="email" value="{{ user.email }}" placeholder="Alamat Email" required>
      <input type="password" name="password" placeholder="Password baru (opsional)">
      <button type="submit">💾 Simpan Perubahan</button>
    </form>

    <a href="{{ url_for('profil') }}" class="kembali">← Kembali ke Profil</a>

    <div class="footer">© 2025 DiagnoSmart | All Rights Reserved</div>
  </div>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5,
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
